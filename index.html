<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Price List</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

h1 {
  text-align: center;
}

/* 🔥 CENTERED CONTROLS */
.controls {
  display: flex;
  justify-content: center; /* center horizontally */
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.controls input {
  width: 250px;
}

input, button {
  padding: 10px;
  font-size: 14px;
}

#productList {
  display: grid;
  gap: 10px;
  max-width: 500px;
  margin: auto;
}

.product {
  background: white;
  padding: 12px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
  text-align: center;
}

.popup-content input {
  width: 100%;
}
</style>
</head>

<body>

<h1>🛒 Store Price List</h1>

<div class="controls">
  <input type="text" id="searchBar" placeholder="Search product...">
  <button onclick="openAddPopup()">➕ Add Product</button>
</div>

<div id="productList"></div>

<!-- ADD / EDIT POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h3 id="popupTitle">Add Product</h3>
    <input type="text" id="popupName" placeholder="Product name"><br><br>
    <input type="number" id="popupPrice" placeholder="Price"><br><br>
    <button onclick="saveProduct()">💾 Save</button>
    <button onclick="closePopup()">Cancel</button>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div id="confirmBox" class="popup">
  <div class="popup-content">
    <p>Delete this product?</p>
    <button onclick="confirmDelete()">Yes</button>
    <button onclick="closeConfirm()">Cancel</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

const supabaseClient = supabase.createClient(
  "https://doevgzfluvspgfdpustq.supabase.co",
  "sb_publishable_jCEeV45FKVHSlBHD53nPZA_fIt5C1Qx"
);

let products = [];
let editIndex = null;
let deleteIndex = null;

const productList = document.getElementById("productList");
const searchBar = document.getElementById("searchBar");

// LOAD
async function loadProducts() {
  const { data } = await supabaseClient.from("products").select("*");

  products = data || [];

  products.sort((a, b) => a.name.localeCompare(b.name));

  renderProducts(searchBar.value);
}

// DISPLAY
function renderProducts(filter = "") {
  productList.innerHTML = "";

  products
    .filter(p => p.name.toLowerCase().includes(filter.toLowerCase()))
    .forEach((product, index) => {

      const div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <div>
          <b>${product.name}</b><br>
          ₱ ${product.price}
        </div>

        <div>
          <button onclick="editProduct(${index})">✏️</button>
          <button onclick="deleteProduct(${index})">🗑</button>
        </div>
      `;

      productList.appendChild(div);
    });
}

// OPEN ADD
window.openAddPopup = function () {
  editIndex = null;
  document.getElementById("popupTitle").textContent = "Add Product";
  document.getElementById("popupName").value = "";
  document.getElementById("popupPrice").value = "";
  document.getElementById("popup").style.display = "flex";
};

// EDIT
window.editProduct = function (index) {
  editIndex = index;
  const p = products[index];

  document.getElementById("popupTitle").textContent = "Edit Product";
  document.getElementById("popupName").value = p.name;
  document.getElementById("popupPrice").value = p.price;
  document.getElementById("popup").style.display = "flex";
};

// SAVE
window.saveProduct = async function () {
  const name = document.getElementById("popupName").value;
  const price = document.getElementById("popupPrice").value;

  if (!name || !price) {
    alert("Fill all fields");
    return;
  }

  if (editIndex === null) {
    await supabaseClient.from("products").insert([{ name, price }]);
  } else {
    await supabaseClient
      .from("products")
      .update({ name, price })
      .eq("id", products[editIndex].id);
  }

  closePopup();
  loadProducts();
};

// CLOSE POPUP
window.closePopup = function () {
  document.getElementById("popup").style.display = "none";
};

// DELETE
window.deleteProduct = function (index) {
  deleteIndex = index;
  document.getElementById("confirmBox").style.display = "flex";
};

window.confirmDelete = async function () {
  await supabaseClient
    .from("products")
    .delete()
    .eq("id", products[deleteIndex].id);

  closeConfirm();
  loadProducts();
};

window.closeConfirm = function () {
  document.getElementById("confirmBox").style.display = "none";
};

// SEARCH
searchBar.addEventListener("input", function () {
  renderProducts(this.value);
});

// START
loadProducts();

});
</script>

</body>
</html>
